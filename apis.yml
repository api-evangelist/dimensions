apis:
  - aid: dimensions:dimensions-analytics-api
    name: Dimensions Analytics API
    description: >-
      The Dimensions Analytics API provides programmatic access to the
      Dimensions research data platform via the Dimensions Search Language
      (DSL). It supports queries against publications, grants, patents,
      clinical trials, datasets, organizations, and researchers. Authentication
      uses an API key exchanged for a JWT token via POST to /api/auth, with
      query requests sent to /api/dsl/v2 carrying the JWT in the Authorization
      header. The API is subscription-only and rate limited to 30 requests per
      IP per minute.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.dimensions.ai/dsl/
    baseURL: https://app.dimensions.ai/api

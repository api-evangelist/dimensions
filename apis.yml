aid: dimensions
name: Dimensions
url: >-
  https://raw.githubusercontent.com/api-evangelist/dimensions/refs/heads/main/apis.yml
description: >-
  Dimensions is a research data platform from Digital Science providing access
  to publications, grants, patents, clinical trials, datasets, and policy
  documents. The Dimensions Analytics API offers programmatic access to this
  research data via the Dimensions Search Language (DSL), enabling citation
  analysis, researcher discovery, organization benchmarking, and topic
  identification. The API is subscription-only and is not intended for bulk
  data extraction or to power dashboards or other derivative products.
